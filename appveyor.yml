---
version: 1.1.x.{build}
branches:
  only:
    - master
    - upgrade
skip_commits:
  message: /^\(?doc\)?.*/
platform:
  - x64
configuration: Release
clone_depth: 10
image:
  - 'Visual Studio 2019'
  - 'Ubuntu2004'
for:
-
  matrix:
    only:
      - image: 'Visual Studio 2019'
    environment:
      matrix:
        - APPVEYOR_JOB_NAME: 'Visual Studio 2019'
    install_windows:
      - choco install puppet-agent --version 7.12.0 -y
      - choco install pdk -y --version 3.0.0
      - refreshenv
-
  matrix:
    only:
      - image: 'Ubuntu2004'
    environment:
      matrix:
        - APPVEYOR_JOB_NAME: 'Ubuntu2004'
    install:
      - wget https://apt.puppet.com/puppet-tools-release-focal.deb
      - sudo dpkg -i puppet-tools-release-focal.deb
      - sudo apt-get update
      - sudo apt-get install pdk -y
build: false
test_script:
  - pdk validate --parallel --puppet-version=7
  - pdk test unit --parallel --puppet-version=7
notifications:
  - provider: Email
    to:
      - puppet-modulebouw@kpn.com
    on_build_success: false
    on_build_failure: false
    on_build_status_changed: false
